<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Subtle pattern overlay -->
  <rect width="1200" height="630" fill="url(#pattern)" opacity="0.03"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    
    <pattern id="pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    
    <linearGradient id="logoGradient" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  
  <!-- PT Logo Badge -->
  <g transform="translate(540, 160)">
    <!-- Badge background -->
    <rect x="0" y="0" width="120" height="120" rx="24" fill="white" opacity="0.15"/>
    <rect x="4" y="4" width="112" height="112" rx="20" fill="url(#logoGradient)"/>
    
    <!-- PT Monogram -->
    <text x="60" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ec4899" text-anchor="middle">PT</text>
  </g>
  
  <!-- PinkTech Text -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle">PinkTech</text>
  
  <!-- Tagline -->
  <text x="600" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="white" fill-opacity="0.95" text-anchor="middle">The Definitive Directory of Women in Tech</text>
  
  <!-- Decorative line -->
  <line x1="400" y1="450" x2="800" y2="450" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
  
  <!-- Stats/Features -->
  <g transform="translate(0, 480)">
    <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="white" fill-opacity="0.9" text-anchor="middle">40+ Leaders</text>
    <text x="600" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="white" fill-opacity="0.9" text-anchor="middle">6 Categories</text>
    <text x="800" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="white" fill-opacity="0.9" text-anchor="middle">Global Impact</text>
  </g>
</svg>
